<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMAAN | Elite Fortnite Coach</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root { --apple-blue: #0A84FF; }
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-glow { box-shadow: 0 0 30px -5px rgba(10, 132, 255, 0.5); }
        
        /* Custom Cursor */
        #cursor { width: 20px; height: 20px; background: white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; mix-blend-mode: difference; transition: transform 0.15s ease-out; display: none; }
        @media (min-width: 1024px) { #cursor { display: block; } body { cursor: none; } }

        /* Magnetic Button Wrapper */
        .magnetic { display: inline-block; transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1); }

        /* Ripple Effect */
        .ripple { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        /* Pulse Animation */
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(10, 132, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0); } }
        .pulse:hover { animation: pulse-blue 1.5s infinite; }

        /* Modal Transitions */
        #modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }
        #modal-content { transform: scale(0.9) translateY(30px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #modal-overlay.active #modal-content { transform: scale(1) translateY(0); }

        /* Loading Spinner */
        #yt-loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(10,132,255,0.2); border-top-color: var(--apple-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Reveal Animation */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <!-- YouTube Loader -->
    <div id="yt-loader">
        <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-blue-500 font-bold tracking-widest uppercase text-xs">Opening Highlights</p>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="relative h-screen flex flex-col items-center justify-center text-center px-6 overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-600/10 blur-[120px] rounded-full z-0"></div>
        
        <div class="z-10">
            <h1 class="text-[15vw] md:text-[10vw] font-black tracking-tighter leading-none mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-zinc-600">
                ARMAAN
            </h1>
            <p class="text-blue-500 text-sm md:text-xl font-light tracking-[0.4em] uppercase mb-12">Fortnite Pro • Coach • King</p>
            
            <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
                <div class="magnetic">
                    <button id="btn-train" class="relative overflow-hidden px-12 py-5 bg-blue-600 rounded-full font-bold text-lg blue-glow pulse transition-all flex items-center gap-2">
                        <span>Train With Me</span>
                    </button>
                </div>
                <div class="magnetic">
                    <button id="btn-highlights" class="relative overflow-hidden px-12 py-5 glass rounded-full font-bold text-lg hover:bg-white/10 transition-all flex items-center gap-2 group">
                        <i data-lucide="play" class="w-5 h-5 group-hover:text-blue-500 transition-colors"></i>
                        <span>View Highlights</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- The Ego Section (Included for context) -->
    <section class="py-40 bg-[#070707] flex flex-col items-center px-6">
        <h2 class="text-zinc-500 uppercase tracking-[0.5em] text-xs font-bold mb-10">Confidence Level</h2>
        <div class="w-full max-w-2xl h-1 bg-zinc-900 rounded-full overflow-hidden mb-10">
            <div id="ego-bar" class="h-full bg-blue-500 w-0 transition-all duration-[2000ms] ease-out shadow-[0_0_20px_#0A84FF]"></div>
        </div>
        <div class="text-[20vw] md:text-[15vw] font-black italic text-blue-500 leading-none mb-10 reveal">999%</div>
    </section>

    <!-- Booking Modal -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
        <div id="modal-content" class="glass w-full max-w-xl rounded-[40px] p-8 md:p-12 relative overflow-hidden">
            <button id="close-modal" class="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors">
                <i data-lucide="x"></i>
            </button>
            
            <div id="form-container">
                <h2 class="text-3xl font-black mb-2 tracking-tight">Request Coaching</h2>
                <p class="text-zinc-400 mb-8 text-sm">Join the elite. Fill out your details below.</p>
                
                <form id="coaching-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors">
                        <input type="text" placeholder="Epic Games Username" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors">
                        <input type="text" placeholder="Discord Username" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <select required class="w-full bg-[#111] border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors text-zinc-400">
                        <option value="">Current Fortnite Rank</option>
                        <option>Unreal</option>
                        <option>Champion</option>
                        <option>Elite</option>
                        <option>Diamond or Below</option>
                    </select>
                    <textarea placeholder="What is your coaching goal?" required rows="3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-colors"></textarea>
                    
                    <button type="submit" class="w-full py-5 bg-blue-600 rounded-2xl font-black text-lg blue-glow hover:bg-blue-500 transition-all uppercase tracking-widest mt-4">
                        Request Coaching
                    </button>
                </form>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden text-center py-12">
                <div class="w-20 h-20 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="check-circle" class="w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-black mb-4">Request Sent!</h2>
                <p class="text-zinc-400">Armaan will contact you via Discord or Email shortly. Get ready for high ground.</p>
                <button id="success-close" class="mt-8 text-blue-500 font-bold uppercase tracking-widest text-sm underline">Close</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });

        // Magnetic Effect
        document.querySelectorAll('.magnetic').forEach(wrap => {
            wrap.addEventListener('mousemove', e => {
                const rect = wrap.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2) * 0.4;
                const y = (e.clientY - rect.top - rect.height/2) * 0.4;
                wrap.style.transform = `translate(${x}px, ${y}px)`;
            });
            wrap.addEventListener('mouseleave', () => {
                wrap.style.transform = `translate(0px, 0px)`;
            });
        });

        // Ripple Effect
        function createRipple(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size/2;
            const y = e.clientY - rect.top - size/2;
            
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.classList.add('ripple');
            
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // --- Highlights Logic ---
        const btnHighlights = document.getElementById('btn-highlights');
        btnHighlights.addEventListener('click', e => {
            createRipple(e);
            document.getElementById('yt-loader').style.display = 'flex';
            
            setTimeout(() => {
                window.open('https://www.youtube.com/watch?v=F_fD8vE5U3s', '_blank', 'noopener,noreferrer');
                document.getElementById('yt-loader').style.display = 'none';
            }, 500);
        });

        // --- Modal Logic ---
        const btnTrain = document.getElementById('btn-train');
        const overlay = document.getElementById('modal-overlay');
        const closeModal = document.getElementById('close-modal');
        const coachingForm = document.getElementById('coaching-form');
        const successMessage = document.getElementById('success-message');
        const formContainer = document.getElementById('form-container');

        const openModal = () => {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const closeAll = () => {
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
            setTimeout(() => {
                successMessage.classList.add('hidden');
                formContainer.classList.remove('hidden');
                coachingForm.reset();
            }, 400);
        };

        btnTrain.addEventListener('click', e => {
            createRipple(e);
            setTimeout(openModal, 200);
        });

        closeModal.addEventListener('click', closeAll);
        document.getElementById('success-close').addEventListener('click', closeAll);
        
        overlay.addEventListener('click', e => {
            if (e.target === overlay) closeAll();
        });

        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeAll();
        });

        // Form Submission
        coachingForm.addEventListener('submit', e => {
            e.preventDefault();
            formContainer.classList.add('hidden');
            successMessage.classList.remove('hidden');
            lucide.createIcons();
        });

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if(entry.target.id === 'ego-bar') entry.target.style.width = '100%';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal, #ego-bar').forEach(el => observer.observe(el));
    </script>
</body>
</html>
